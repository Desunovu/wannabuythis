---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: backend-strip-prefix
  namespace: wannabuythis
spec:
  stripPrefix:
    prefixes:
      - /api
    forceSlash: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wannabuythis-frontend
  namespace: wannabuythis
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wannabuythis-backend
  namespace: wannabuythis
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: wannabuythis-backend-strip-prefix@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
 