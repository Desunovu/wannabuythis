name: Generate OpenAPI Specs

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  generate-openapi-specs:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        uv-version: ["0.9.21"]

    steps:
      # For PRs from forks
      - uses: actions/checkout@v6
      # For PRs from the same repo
      - uses: actions/checkout@v6
        if: ( github.event_name != 'pull_request' || github.secret_source == 'Actions' )
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.WANNABUYTHIS_REPO_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ matrix.uv-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync
        working-directory: ./backend

      - name: Generate OpenAPI spec
        run: uv run bash scripts/generate-openapi-specs.sh

      - name: Add changes to git
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "github-actions"
          git add frontend/openapi.json

      # Same repo PRs
      - name: Push changes
        if: ( github.event_name != 'pull_request' || github.secret_source == 'Actions' )
        run: |
          git diff --staged --quiet || git commit -m "chore(frontend): Autogenerate OpenAPI specs"
          git push

      # Fork PRs
      - name: Check changes
        if: ( github.event_name == 'pull_request' && github.secret_source != 'Actions' )
        run: |
          git diff --staged --quiet || (echo "Changes detected in generated OpenAPI spec, run scripts/generate-openapi-specs.sh and commit the changes" && exit 1)
